<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site MS Code</title>
    <link rel="shortcut icon" href="https://i.pinimg.com/736x/3d/75/6e/3d756e6a19ac202f5521c26f647f9e05.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>MInha Loja :P</h1>
        <nav>
            <ul>
                <li><a href="#inicio">Início</a></li>
                <li><a href="#produtos">Produtos</a></li>
                <li><a href="#categorias">Categorias</a></li>
                <li><a href="#contatos">Contatos</a></li>
            </ul>
            <label for="pesquisar">Pesquisar</label>
            <input type="search" name="pesquisar" id="pesquisar">
            <button type="submit">Pesquisar</button>
        </nav>
    </header>

    <hr>

    <main>
        <section id="inicio" >
            <h2>Bem vindo a minha loja!</h2>
            <img src="https://i.pinimg.com/736x/86/f9/9a/86f99afd3472cfeb9de85b1e39fe677a.jpg" alt="ilustração de um morcego encapotado feliz virado para a câmera" width="600">

            <h2>Categorias</h2>
            <ul>
            <li>Camisetas</li>
            <li>Calçados</li>
            <li>Perfumaria</li>
            </ul>
        </section>

        <section id="produtos">
            <h2>Nossos Produtos</h2>
            <table border="1">
                <tr>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Foto</th>
                </tr>
                <tr>
                    <td>Camiseta</td>
                    <td>R$ 105,00</td>
                    <td><img src="https://i.pinimg.com/736x/14/75/24/147524bbc08cb7ebf8b000bd9feb2465.jpg" alt="Camiseta da marca Loremlol" width="100" height="100"></td>
                </tr>

                <tr>
                    <td>Calçados</td>
                    <td>R$ 285,00</td>
                    <td><img src="https://i.pinimg.com/736x/e9/ce/f2/e9cef24de8bed008a3c5430aaf66412d.jpg" alt="Calçado alternativo" width="100" height="100"></td>
                </tr>
                <tr>
                    <td>Perfume</td>
                    <td>R$ 626,00</td>
                    <td><img src="https://i.pinimg.com/736x/b8/5e/7e/b85e7e005cdf6699633a9fc1cc19916c.jpg" alt="Foto do perfume Le Beau Le Parfum by JPG" width="100" height="100"></td>
                </tr>
            </section>
        </table>


    </main>

    <hr>

    <footer>
        <h2>Fale Conosco</h2>
        
        <label for="nome">Nome: </label>
        <br>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome aqui">

        <br><br>

        <label for="email">E-mail: </label>
        <br>
        <input type="text" name="email" id="email" placeholder="Digite seu E-Mail aqui">

        <br><br>
        
        <label for="assunto">Assunto: </label>
        <br>
        <textarea name="assunto" id="assunto" placeholder="Digite o assunto" rows="4"></textarea>
    </footer>
    
</body>
</html>
